version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=true
      - DATABASE_URL=postgresql://rai_user:rai_password@db:5432/rai_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev_secret_key
      - JWT_SECRET_KEY=dev_jwt_key
      # - OPENAI_API_KEY=your_key_here
      # - SMTP_SERVER=smtp.example.com
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=rai_user
      - POSTGRES_PASSWORD=rai_password
      - POSTGRES_DB=rai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: