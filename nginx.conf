events {}

http {
    # Include standard mime types to ensure browser understands file types like CSS
    include /etc/nginx/mime.types;
    client_max_body_size 16M;

    server {
        listen 80;
        server_name localhost;

        # All requests start by looking for files in the frontend directory
        root /usr/share/nginx/html;
        index index.html;

        # For Single Page Applications: if a file isn't found, serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy all requests for /api/... to the backend service
        location /api/ {
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}